{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel">
    <h2>Create an Account</h2>
    <p class="subtitle">Join the SJSU Library system</p>
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="johndoe">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        
        <div class="form-group">
            <label for="role">Requested Role</label>
            <select id="role" name="role" required>
                <option value="student">Student</option>
                <option value="librarian">Librarian</option>
                <option value="admin">Administrator</option>
            </select>
            <small class="help-text">Librarian and Admin roles require approval.</small>
        </div>
        
        <button type="submit" class="btn-primary w-100">Register</button>
    </form>
    
    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
