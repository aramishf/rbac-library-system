{% extends "base.html" %}

{% block content %}
<div class="header">
    <h1>Library Catalog</h1>
    <p>Browse our collection of books.</p>
</div>

<div class="grid">
    {% for book_id, book in books.items() %}
    <div class="card">
        <h3>{{ book.title }}</h3>
        <p><strong>Author:</strong> {{ book.author }}</p>
        <p><strong>Status:</strong> <span class="badge">{{ book.status }}</span></p>
        <a href="#" class="btn-primary" style="margin-top: 10px; display: inline-block;">Borrow Book</a>
    </div>
    {% endfor %}
</div>
<div style="margin-top: 20px;">
    <a href="{{ url_for('dashboard') }}" class="btn-secondary">Back to Dashboard</a>
</div>
{% endblock %}
