{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel">
    <h2>Welcome Back</h2>
    <p class="subtitle">Enter your credentials to access SJSU Library</p>
    
    {# Basic login form that posts to the /login route #}
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="johndoe">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn-primary w-100">Sign In</button>
    </form>
    
    <div class="auth-footer">
        <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</div>
{% endblock %}
